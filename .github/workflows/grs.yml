name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  DARK_THEME: github_dark_dimmed
  LIGHT_THEME: default
  HIDDEN_LANGUAGES: HTML,CSS,XSLT,Perl,Vim%20Script,Scheme,Roff,CMake,Vue,Astro

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=${{ env.DARK_THEME }}&include_all_commits=true
          path: profile/stats-dark.svg
          core_version: 2.1.2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats card light
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=${{ env.LIGHT_THEME }}&include_all_commits=true
          path: profile/stats-light.svg
          core_version: 2.1.2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=${{ env.DARK_THEME }}&langs_count=6&hide=${{ env.HIDDEN_LANGUAGES }}
          path: profile/top-langs-dark.svg
          core_version: 2.1.2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card light
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=${{ env.LIGHT_THEME }}&langs_count=6&hide=${{ env.HIDDEN_LANGUAGES }}
          path: profile/top-langs-light.svg
          core_version: 2.1.2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak
        run: |
          set -xe
          curl -fSsL 'https://streak-stats.demolab.com?theme=${{ env.DARK_THEME }}&user=${{ github.repository_owner }}' > profile/streak-dark.svg
          curl -fSsL 'https://streak-stats.demolab.com?theme=${{ env.LIGHT_THEME }}&user=${{ github.repository_owner }}' > profile/streak-light.svg

      - name: Commit cards
        run: |
          set -xe
          git config user.name "github-actions[bot]"
          git config user.email "25513724+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          if git diff --cached --quiet; then
            echo "No README card changes to commit"
            exit 0
          fi
          git commit -m "Update README cards"
          git push
